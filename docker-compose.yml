services:
  postgres:
    image: postgres:16-alpine
    container_name: code-connect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: code_connect
      POSTGRES_USER: code_connect
      POSTGRES_PASSWORD: code_connect
    ports:
      - '5432:5432'
    volumes:
      - code_connect_postgres_data:/var/lib/postgresql/data

volumes:
  code_connect_postgres_data:
